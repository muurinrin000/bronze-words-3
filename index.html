<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顔のパーツをおぼえよう</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fff7df;
  text-align:center;
  color:#263044;
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:20px;
}

h1{
  color:#ff8c00;
  font-size:26px;
}

.face-area{
  position:relative;
  width:330px;
  margin:20px auto;
}

.face-img{
  width:100%;
  display:block;
}

.tap{
  position:absolute;
  border:3px solid #4dabf7;
  background:rgba(77,171,247,0.15);
  border-radius:50%;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#1565c0;
  font-size:13px;
  font-weight:bold;

  transition:all 0.15s;
}

.tap:active{
  transform:scale(1.1);
  background:rgba(77,171,247,0.3);
}



.eye-left{
  top:52%;
  left:29%;
  width:18%;
  height:13%;
}

.eye-right{
  top:52%;
  left:54%;
  width:18%;
  height:13%;
}

.eyebrow-left{
  top:45%;
  left:28%;
  width:18%;
  height:8%;
}

.eyebrow-right{
  top:45%;
  left:55%;
  width:18%;
  height:8%;
}

.nose{
  top:61%;
  left:43%;
  width:15%;
  height:13%;
}

.mouth{
  top:75%;
  left:36%;
  width:28%;
  height:10%;
}

.ear-left{
  top:55%;
  left:3%;
  width:14%;
  height:18%;
}

.ear-right{
  top:55%;
  right:3%;
  width:14%;
  height:18%;
}

.face{
  top:82%;
  left:23%;
  width:54%;
  height:10%;
}

/* 髪の毛：上の髪部分だけ */
.hair{
  top:6%;
  left:24%;
  width:52%;
  height:16%;
}

/* 頭：おでこ〜頭の上あたり。髪より少し下 */
.head{
  top:22%;
  left:32%;
  width:36%;
  height:10%;
}



.result{
  background:#fff;
  border:4px solid #8ecae6;
  border-radius:24px;
  padding:20px;
  margin-top:16px;
}

.word{
  font-size:44px;
  font-weight:bold;
  color:#fb8500;
}

.ja{
  font-size:22px;
  margin-top:8px;
}

</style>
</head>

<body>
<div class="wrap">

  <h1>😊 顔のパーツをおぼえよう！</h1>
  <p>顔のパーツをタップしてね</p>

  <div class="face-area">
    <img src="20EDAC44-180E-42AB-8C85-191BE2213E2A.png" class="face-img" alt="顔のイラスト">

  <!-- 顔の中をタップ -->
  <button class="tap eye-left" onclick="showWord('eye','目')"></button>
  <button class="tap eye-right" onclick="showWord('eye','目')"></button>
  <button class="tap eyebrow-left" onclick="showWord('eyebrow','眉毛')"></button>
  <button class="tap eyebrow-right" onclick="showWord('eyebrow','眉毛')"></button>
  <button class="tap nose" onclick="showWord('nose','鼻')"></button>
  <button class="tap mouth" onclick="showWord('mouth','口')"></button>
  <button class="tap ear-left" onclick="showWord('ear','耳')"></button>
  <button class="tap ear-right" onclick="showWord('ear','耳')"></button>
  <button class="tap hair" onclick="showWord('hair','髪の毛')"></button>
  <button class="tap head" onclick="showWord('head','頭')"></button>
  <button class="tap face" onclick="showWord('face','顔')"></button>
</div>
    

  <div class="result">
    <div class="word" id="word">Tap!</div>
    <div class="ja" id="ja">タップしてね</div>
  </div>

</div>

<script>
function showWord(word, japanese){

  document.getElementById("word").textContent = word;
  document.getElementById("ja").textContent = japanese;

  speechSynthesis.cancel();

  const english = new SpeechSynthesisUtterance(word);
  english.lang = "en-US";
  english.rate = 0.8;

  const japaneseVoice = new SpeechSynthesisUtterance(japanese);
  japaneseVoice.lang = "ja-JP";
  japaneseVoice.rate = 0.9;

  english.onend = () => {
    speechSynthesis.speak(japaneseVoice);
  };

  speechSynthesis.speak(english);
}
</script>

</body>
</html>
